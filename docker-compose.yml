# Dev defaults live in the ${VAR:-default} fallbacks; override via a .env file
# (see .env.example) — never by editing this file.
x-db-env: &db-env
  DFL24_DATABASE_URL: postgresql://${POSTGRES_USER:-dfl24}:${POSTGRES_PASSWORD:-dfl24}@postgres:5432/${POSTGRES_DB:-dfl24sim}

x-auth-env: &auth-env
  # empty = no-auth dev mode; set AUTHKIT_DOMAIN to enable the WorkOS OAuth
  # flow (see server/dfl24sim_server/auth.py for the two modes)
  DFL24_AUTHKIT_DOMAIN: ${AUTHKIT_DOMAIN:-}
  DFL24_SERVER_BASE_URL: ${SERVER_BASE_URL:-http://localhost:8000}

x-s3-env: &s3-env
  # in-network endpoint for uploads; the public one is what signed URLs carry
  DFL24_S3_ENDPOINT: http://minio:9000
  DFL24_S3_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_URL:-http://localhost:${MINIO_PORT:-9000}}
  DFL24_S3_BUCKET: ${MINIO_BUCKET:-dfl24-artifacts}
  DFL24_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-dfl24}
  DFL24_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dfl24secret}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dfl24}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dfl24}
      POSTGRES_DB: ${POSTGRES_DB:-dfl24sim}
    ports:
      # host-side only; in-network clients always use postgres:5432
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dfl24} -d ${POSTGRES_DB:-dfl24sim}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dfl24}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dfl24secret}
    ports:
      # host-side only; in-network clients always use minio:9000
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: ["python", "-m", "dfl24sim_server.migrate"]
    environment: *db-env
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: [*db-env, *s3-env, *auth-env]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: ["python", "-m", "dfl24sim_server.worker"]
    environment:
      <<: [*db-env, *s3-env]
    depends_on:
      migrate:
        condition: service_completed_successfully
      # jobs degrade to a warning without storage; the dep just avoids
      # warnings during normal stack startup
      minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
