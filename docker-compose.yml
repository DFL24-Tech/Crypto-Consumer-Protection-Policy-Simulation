# Minimal persistent stack for a shared "dev env" VPS — same services as
# docker-compose.local.yml (laptop dev), plus restart policies since this
# variant is meant to stay up between sessions. No TLS/Caddy here: front it
# with the standalone deploy/nginx-dev.conf on the VPS's system nginx (see
# docs/DEV-ENV.md). For real production with Caddy/TLS, layer
# docker-compose.prod.yml on top of this file instead, per docs/DEPLOY.md.
# Dev defaults live in the ${VAR:-default} fallbacks; override via a .env file
# (see .env.example) — never by editing this file.
x-db-env: &db-env
  DFL24_DATABASE_URL: postgresql://${POSTGRES_USER:-dfl24}:${POSTGRES_PASSWORD:-dfl24}@postgres:5432/${POSTGRES_DB:-dfl24sim}

x-auth-env: &auth-env
  # empty = no-auth dev mode; set AUTHKIT_DOMAIN to enable the WorkOS OAuth
  # flow (see server/dfl24sim_server/auth.py for the two modes)
  DFL24_AUTHKIT_DOMAIN: ${AUTHKIT_DOMAIN:-}
  DFL24_SERVER_BASE_URL: ${SERVER_BASE_URL:-http://localhost:8000}

x-s3-env: &s3-env
  # in-network endpoint for uploads; the public one is what signed URLs carry
  DFL24_S3_ENDPOINT: http://minio:9000
  DFL24_S3_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_URL:-http://localhost:${MINIO_PORT:-9000}}
  DFL24_S3_BUCKET: ${MINIO_BUCKET:-dfl24-artifacts}
  DFL24_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-dfl24}
  DFL24_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dfl24secret}

x-web-env: &web-env
  WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
  WORKOS_API_KEY: ${WORKOS_API_KEY:-}
  WORKOS_COOKIE_PASSWORD: ${WORKOS_COOKIE_PASSWORD:-}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dfl24}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dfl24}
      POSTGRES_DB: ${POSTGRES_DB:-dfl24sim}
    ports:
      # loopback-only: in-network clients use postgres:5432, and on a public
      # VPS this must never be reachable from the internet
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dfl24} -d ${POSTGRES_DB:-dfl24sim}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dfl24}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dfl24secret}
    ports:
      # loopback-only: in-network clients use minio:9000; the public artifact
      # endpoint is served through Caddy in prod, never by exposing this port
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: ["python", "-m", "dfl24sim_server.migrate"]
    environment: *db-env
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      # loopback-only: a same-host reverse proxy (nginx here, Caddy in real
      # prod) reaches this over the compose network as server:8000; the host
      # port is for same-host access only
      - "127.0.0.1:8000:8000"
    environment:
      <<: [*db-env, *s3-env, *auth-env]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # NEXT_PUBLIC_* vars are inlined into the JS bundle at build time by
        # Next.js — a runtime environment: override has no effect, so this
        # must be a build arg. Changing WEB_REDIRECT_URI requires rebuilding
        # this image (`docker compose up -d --build web`), not just restarting it.
        NEXT_PUBLIC_WORKOS_REDIRECT_URI: ${WEB_REDIRECT_URI:-http://localhost:3000/callback}
    restart: unless-stopped
    ports:
      # loopback-only, same convention as server/postgres/minio; host side is
      # 3050 (not the usual 3000) because port 3000 is already occupied by
      # another process on this VPS — see deploy/nginx-dev.conf
      - "127.0.0.1:3050:3000"
    environment:
      <<: *web-env
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "dfl24sim_server.worker"]
    environment:
      <<: [*db-env, *s3-env]
    depends_on:
      migrate:
        condition: service_completed_successfully
      # jobs degrade to a warning without storage; the dep just avoids
      # warnings during normal stack startup
      minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
