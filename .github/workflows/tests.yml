name: tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dfl24
          POSTGRES_PASSWORD: dfl24
          POSTGRES_DB: dfl24sim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dfl24 -d dfl24sim"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e "server/[dev]"
      - name: Run tests
        run: pytest -q
      - name: Run server tests
        run: pytest -q server/tests
        env:
          DFL24_TEST_DATABASE_URL: postgresql://dfl24:dfl24@localhost:5432/dfl24sim
